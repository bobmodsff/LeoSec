    <!-- Intro video fade logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const introVid = document.getElementById('intro-video');
            const introCont = document.getElementById('intro-container');
            if (introVid) {
                // try to allow audio: unmute on interaction or when ready
                const enableAudio = () => {
                    if (introVid.muted) {
                        introVid.muted = false;
                        // try restart playback with sound
                        introVid.play().catch(()=>{});
                    }
                };
                // unmute on first user interaction
                document.addEventListener('click', enableAudio, { once: true });
                // also unmute once the video can play if browser auto-muted
                introVid.addEventListener('canplaythrough', enableAudio);

                introVid.addEventListener('ended', () => {
                    // after video ends, fade overlay then hide
                    introCont.classList.add('fade-out');
                    setTimeout(() => { introCont.style.display = 'none'; }, 1200);
                });
            }
        });
    </script>

    <script>
        // basic AI chat functionality using OpenAI ChatGPT API
        const chatBtn = document.getElementById('ai-chat-btn');
        const chatContainer = document.getElementById('ai-chat-container');
        const chatClose = document.getElementById('ai-chat-close');
        const chatMessages = document.getElementById('ai-chat-messages');
        const chatInput = document.getElementById('ai-chat-input');

        chatBtn.addEventListener('click', () => {
            chatContainer.classList.toggle('hidden');
            chatInput.focus();
        });
        chatClose.addEventListener('click', () => {
            chatContainer.classList.add('hidden');
        });

        async function sendMessage(text) {
            if (!text) return;
            appendMessage('Você', text);
            chatInput.value = '';
            try {
                const resp = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer YOUR_API_KEY'
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{ role: 'user', content: text }]
                    })
                });
                const data = await resp.json();
                const reply = data?.choices?.[0]?.message?.content || 'Desculpe, sem resposta.';
                appendMessage('IA', reply);
            } catch (e) {
                appendMessage('IA', 'Erro na requisição: ' + e.message);
            }
        }

        function appendMessage(author, content) {
            const msg = document.createElement('div');
            msg.className = 'mb-2';
            msg.innerHTML = `<strong>${author}:</strong> ${content}`;
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendMessage(chatInput.value.trim());
            }
        });
    </script>
